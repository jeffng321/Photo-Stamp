<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OGS Photo Stamper Tool v2.3</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0; background: #f1f5f9; color: #1e293b;
  }
  header {
    background: #0f172a; color: #fff; padding: 16px; text-align: center;
  }
  header h1 { margin: 0; font-size: 1.25rem; }
  .container { max-width: 600px; margin: 0 auto; padding: 12px; }
  
  .card {
    background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  .card h2 { font-size: 1rem; margin: 0 0 12px; color: #0f172a; }
  
  .settings-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
  .settings-row label { font-size: 0.85rem; font-weight: 600; color: #334155; white-space: nowrap; }
  .settings-row input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; padding: 0; border-radius: 4px; }
  .settings-row input[type="range"] { flex-grow: 1; cursor: pointer; }
  
  .quality-value { font-size: 0.85rem; font-weight: 600; color: #2563eb; min-width: 45px; text-align: right; }

  label.field { display:block; font-size:.85rem; font-weight:600; margin-bottom:6px; color:#334155; }
  input[type=file], input[type=text] {
    width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.95rem; font-family:inherit; margin-bottom: 15px;
  }
  
  .preview-wrap {
    width: 100%; border: 2px dashed #cbd5e1; border-radius: 8px;
    background: #f8fafc; min-height: 200px; padding: 10px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .placeholder { color:#94a3b8; padding:40px 10px; text-align:center; margin: auto; }
  
  .photo-item {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  canvas {
    max-width: 100%; height: auto; border-radius: 4px;
  }

  button {
    cursor:pointer; border:none; border-radius:8px; padding:12px 16px;
    font-size:1rem; font-weight:600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-success { background:#16a34a; color:#fff; }
  .btn-success:hover { background:#15803d; }
  .btn-primary { background:#2563eb; color:#fff; margin-bottom: 15px; }
  .btn-primary:hover { background:#1d4ed8; }
</style>
</head>
<body>

<header>
  <h1>📸 OGS Photo Stamper Tool v2.3</h1>
</header>

<div class="container">
  
  <div class="card">
    <h2>1. 設定文字與照片</h2>
    
    <label class="field">自訂文字</label>
    <input type="text" id="overlayText" placeholder="在此輸入文字...">

    <div class="settings-row">
      <label>字體顏色:</label>
      <input type="color" id="textColorInput" value="#ffffff">
      <label style="margin-left: 10px;">大小:</label>
      <input type="range" id="textSizeInput" min="10" max="80" value="30">
    </div>

    <div class="settings-row">
      <label>背景顏色:</label>
      <input type="color" id="bgColorInput" value="#000000">
      <label style="margin-left: 10px;">透明度:</label>
      <input type="range" id="bgOpacityInput" min="0" max="100" value="60">
    </div>
    
    <div class="settings-row" style="margin-bottom: 20px;">
      <label>輸出畫質:</label>
      <input type="range" id="qualityInput" min="10" max="100" value="80">
      <span class="quality-value" id="qualityLabel">80%</span>
    </div>

    <label class="field">選擇照片 (支援多張與相機)</label>
    <input type="file" id="photoInput" accept="image/*" multiple>
  </div>

  <div class="card">
    <h2>2. 預覽與下載</h2>
    
    <button id="downloadAllBtn" class="btn-primary" style="display: none;">
      💾 一鍵儲存所有照片 (打包成 ZIP)
    </button>

    <div class="preview-wrap" id="previewContainer">
      <div class="placeholder" id="placeholderMsg">上傳照片以查看預覽</div>
    </div>
  </div>

</div>

<script>
  const photoInput = document.getElementById('photoInput');
  const overlayTextInput = document.getElementById('overlayText');
  const previewContainer = document.getElementById('previewContainer');
  const placeholderMsg = document.getElementById('placeholderMsg');
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  
  const textColorInput = document.getElementById('textColorInput');
  const textSizeInput = document.getElementById('textSizeInput');
  const bgColorInput = document.getElementById('bgColorInput');
  const bgOpacityInput = document.getElementById('bgOpacityInput');
  
  // New Quality Slider elements
  const qualityInput = document.getElementById('qualityInput');
  const qualityLabel = document.getElementById('qualityLabel');

  let imagesData = [];

  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }

  // Update the quality label visually as the user drags it
  qualityInput.addEventListener('input', (e) => {
    qualityLabel.textContent = e.target.value + '%';
  });

  // Handle file uploads
  photoInput.addEventListener('change', (e) => {
    const files = e.target.files;
    if (files.length === 0) return;

    imagesData = [];
    previewContainer.innerHTML = ''; 
    
    if (files.length > 1) {
      downloadAllBtn.style.display = 'flex';
    } else {
      downloadAllBtn.style.display = 'none';
    }
    
    Array.from(files).forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          createImagePreview(img, index);
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  });

  const updateAllCanvases = () => {
    imagesData.forEach(data => drawStampedImage(data.img, data.canvas));
  };

  overlayTextInput.addEventListener('input', updateAllCanvases);
  textColorInput.addEventListener('input', updateAllCanvases);
  textSizeInput.addEventListener('input', updateAllCanvases);
  bgColorInput.addEventListener('input', updateAllCanvases);
  bgOpacityInput.addEventListener('input', updateAllCanvases);

  function createImagePreview(img, index) {
    const photoItem = document.createElement('div');
    photoItem.className = 'photo-item';

    const canvas = document.createElement('canvas');
    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'btn-success';
    downloadBtn.innerHTML = `💾 儲存照片 ${index + 1}`;
    
    imagesData.push({ img, canvas });

    photoItem.appendChild(canvas);
    photoItem.appendChild(downloadBtn);
    previewContainer.appendChild(photoItem);

    drawStampedImage(img, canvas);

    downloadBtn.addEventListener('click', () => triggerDownload(canvas, index + 1));
  }

  function drawStampedImage(img, canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const sizeMultiplier = parseInt(textSizeInput.value) / 30;
    const fontSize = Math.max(12, Math.floor(canvas.height * 0.03 * sizeMultiplier)); 
    ctx.font = `bold ${fontSize}px sans-serif`;
    
    const customText = overlayTextInput.value.trim();
    const now = new Date();
    const dateStr = now.getFullYear() + '/' + String(now.getMonth() + 1).padStart(2, '0') + '/' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

    const padding = fontSize * 0.8;
    const boxWidth = Math.max(ctx.measureText(customText).width, ctx.measureText(dateStr).width) + (padding * 2);
    const boxHeight = (fontSize * 2) + (fontSize * 0.4) + (padding * 2);
    const margin = fontSize;
    const boxX = margin;
    const boxY = canvas.height - boxHeight - margin;

    ctx.fillStyle = hexToRgba(bgColorInput.value, parseInt(bgOpacityInput.value) / 100);
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxWidth, boxHeight, fontSize * 0.3);
    ctx.fill();

    ctx.fillStyle = textColorInput.value;
    ctx.textBaseline = 'top';
    ctx.fillText(customText, boxX + padding, boxY + padding);
    ctx.fillText(dateStr, boxX + padding, boxY + padding + fontSize + (fontSize * 0.4));
  }

  // Handle dynamic compression logic
  function applyDynamicCompression(canvas) {
    const qualityPercentage = parseInt(qualityInput.value);
    let finalCanvas = canvas;
    
    // If less than 100%, dynamically scale down the image resolution
    if (qualityPercentage < 100) {
        // Maps quality (10 to 99) to a maximum dimension between roughly 800px and 2500px
        const maxDim = 600 + (qualityPercentage * 18); 
        let w = canvas.width;
        let h = canvas.height;
        
        if (w > maxDim || h > maxDim) {
            const ratio = Math.min(maxDim / w, maxDim / h);
            w *= ratio; h *= ratio;
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(canvas, 0, 0, w, h);
            finalCanvas = c;
        }
    }
    return finalCanvas;
  }

  // Handle downloading a single canvas
  function triggerDownload(canvas, fileIndex) {
    const now = new Date();
    const yy = String(now.getFullYear()).slice(-2);
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const sec = String(now.getSeconds()).padStart(2, '0');
    
    let safeCustomText = overlayTextInput.value.trim() || '現場照片';
    safeCustomText = safeCustomText.replace(/[\/\\?%*:|"<>]/g, '-'); 
    
    // Apply the pro compression logic
    const finalCanvas = applyDynamicCompression(canvas);
    const qualityPercentage = parseInt(qualityInput.value);

    // Apply the JPEG compression factor (0.10 to 1.0)
    const dataURL = finalCanvas.toDataURL('image/jpeg', qualityPercentage / 100);
    
    const link = document.createElement('a');
    link.download = `${safeCustomText}_${yy}${mm}${dd}-${hh}${min}${sec}-${fileIndex}.jpg`;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  // Handle saving ALL photos into a ZIP file
  downloadAllBtn.addEventListener('click', async () => {
    const originalText = downloadAllBtn.innerHTML;
    downloadAllBtn.disabled = true;
    downloadAllBtn.innerHTML = '⏳ 正在打包成 ZIP...請稍候';

    try {
      const zip = new JSZip();
      
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      
      let safeCustomText = overlayTextInput.value.trim() || '現場照片';
      safeCustomText = safeCustomText.replace(/[\/\\?%*:|"<>]/g, '-'); 
      const qualityPercentage = parseInt(qualityInput.value);

      imagesData.forEach((data, index) => {
        // Apply the pro compression logic
        const finalCanvas = applyDynamicCompression(data.canvas);

        // Apply the JPEG compression factor (0.10 to 1.0)
        const dataURL = finalCanvas.toDataURL('image/jpeg', qualityPercentage / 100);
        const base64Data = dataURL.split(',')[1];
        const fileName = `${safeCustomText}_${yy}${mm}${dd}-${hh}${min}-${index + 1}.jpg`;
        
        zip.file(fileName, base64Data, {base64: true});
      });

      const content = await zip.generateAsync({ type: "blob" });
      const link = document.createElement('a');
      link.download = `Batch_Photos_${yy}${mm}${dd}-${hh}${min}.zip`;
      link.href = URL.createObjectURL(content);
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);

    } catch (error) {
      console.error("ZIP creation failed:", error);
      alert("打包失敗，請重試。 (Zip creation failed)");
    } finally {
      downloadAllBtn.disabled = false;
      downloadAllBtn.innerHTML = originalText;
    }
  });
</script>
</body>
</html>
