<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OGS Photo Stamper Tool v2.7</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0; background: #f1f5f9; color: #1e293b;
  }
  header {
    background: #0f172a; color: #fff; padding: 16px; text-align: center;
  }
  header h1 { margin: 0; font-size: 1.25rem; }
  .container { max-width: 600px; margin: 0 auto; padding: 12px; }
  
  .card {
    background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  .card h2 { font-size: 1rem; margin: 0 0 12px; color: #0f172a; }
  
  .settings-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
  .settings-row label { font-size: 0.85rem; font-weight: 600; color: #334155; white-space: nowrap; }
  .settings-row input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; padding: 0; border-radius: 4px; }
  .settings-row input[type="range"] { flex-grow: 1; cursor: pointer; }
  
  .dynamic-value { font-size: 0.85rem; font-weight: 600; color: #2563eb; min-width: 45px; text-align: right; }

  label.field { display:block; font-size:.85rem; font-weight:600; margin-bottom:6px; color:#334155; }
  input[type=file], input[type=text] {
    width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.95rem; font-family:inherit; margin-bottom: 15px;
  }
  
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #334155; }
  
  .tip-text { font-size: 0.85rem; color: #16a34a; font-weight: bold; margin-bottom: 15px; display: block; text-align: center; background: #dcfce7; padding: 8px; border-radius: 6px;}

  .preview-wrap {
    width: 100%; border: 2px dashed #cbd5e1; border-radius: 8px;
    background: #f8fafc; min-height: 200px; padding: 10px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .placeholder { color:#94a3b8; padding:40px 10px; text-align:center; margin: auto; }
  
  .photo-item {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  
  canvas {
    max-width: 100%; height: auto; border-radius: 4px; cursor: move; touch-action: none;
  }

  button {
    cursor:pointer; border:none; border-radius:8px; padding:12px 16px;
    font-size:1rem; font-weight:600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-success { background:#16a34a; color:#fff; }
  .btn-success:hover { background:#15803d; }
  .btn-primary { background:#2563eb; color:#fff; margin-bottom: 15px; }
  .btn-primary:hover { background:#1d4ed8; }
</style>
</head>
<body>

<header>
  <h1>📸 OGS Photo Stamper Tool v2.7</h1>
</header>

<div class="container">
  
  <div class="card">
    <h2>1. 設定文字與照片</h2>
    
    <label class="field">自訂文字</label>
    <input type="text" id="overlayText" placeholder="在此輸入文字...">

    <label class="checkbox-row">
      <input type="checkbox" id="dateCheck" checked> 顯示日期 (Date: YYYY-MM-DD)
    </label>
    <label class="checkbox-row" style="margin-bottom: 20px;">
      <input type="checkbox" id="timeCheck" checked> 顯示時間 (Time: HH:MM)
    </label>

    <div class="settings-row">
      <label>字體顏色:</label>
      <input type="color" id="textColorInput" value="#ffffff">
      <label style="margin-left: 10px;">大小:</label>
      <input type="range" id="textSizeInput" min="10" max="300" value="30">
    </div>

    <div class="settings-row">
      <label>背景顏色:</label>
      <input type="color" id="bgColorInput" value="#000000">
      <label style="margin-left: 10px;">透明度:</label>
      <input type="range" id="bgOpacityInput" min="0" max="100" value="60">
    </div>

    <div class="settings-row">
      <label>文字旋轉:</label>
      <input type="range" id="textRotationInput" min="0" max="360" value="0">
      <span class="dynamic-value" id="textRotationLabel">0°</span>
    </div>
    
    <div class="settings-row" style="margin-bottom: 20px;">
      <label>輸出畫質:</label>
      <input type="range" id="qualityInput" min="10" max="100" value="80">
      <span class="dynamic-value" id="qualityLabel">80%</span>
    </div>

    <label class="field">選擇照片 (支援多張與相機)</label>
    <input type="file" id="photoInput" accept="image/*" multiple>
  </div>

  <div class="card">
    <h2>2. 預覽與下載</h2>
    
    <span class="tip-text">💡 提示：可以直接在下方照片上「拖曳」移動文字位置！</span>

    <button id="downloadAllBtn" class="btn-primary" style="display: none;">
      💾 一鍵儲存所有照片 (打包成 ZIP)
    </button>

    <div class="preview-wrap" id="previewContainer">
      <div class="placeholder" id="placeholderMsg">上傳照片以查看預覽</div>
    </div>
  </div>

</div>

<script>
  const photoInput = document.getElementById('photoInput');
  const overlayTextInput = document.getElementById('overlayText');
  const previewContainer = document.getElementById('previewContainer');
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  
  const textColorInput = document.getElementById('textColorInput');
  const textSizeInput = document.getElementById('textSizeInput');
  const bgColorInput = document.getElementById('bgColorInput');
  const bgOpacityInput = document.getElementById('bgOpacityInput');
  const qualityInput = document.getElementById('qualityInput');
  const qualityLabel = document.getElementById('qualityLabel');
  
  const dateCheck = document.getElementById('dateCheck');
  const timeCheck = document.getElementById('timeCheck');
  
  const textRotationInput = document.getElementById('textRotationInput');
  const textRotationLabel = document.getElementById('textRotationLabel');

  let imagesData = [];

  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }

  // Update dynamic labels
  qualityInput.addEventListener('input', (e) => qualityLabel.textContent = e.target.value + '%');
  textRotationInput.addEventListener('input', (e) => textRotationLabel.textContent = e.target.value + '°');

  photoInput.addEventListener('change', (e) => {
    const files = e.target.files;
    if (files.length === 0) return;

    imagesData = [];
    previewContainer.innerHTML = ''; 
    
    if (files.length > 1) {
      downloadAllBtn.style.display = 'flex';
    } else {
      downloadAllBtn.style.display = 'none';
    }
    
    Array.from(files).forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => createImagePreview(img, index);
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  });

  const updateAllCanvases = () => {
    imagesData.forEach(data => drawStampedImage(data));
  };

  overlayTextInput.addEventListener('input', updateAllCanvases);
  textColorInput.addEventListener('input', updateAllCanvases);
  textSizeInput.addEventListener('input', updateAllCanvases);
  bgColorInput.addEventListener('input', updateAllCanvases);
  bgOpacityInput.addEventListener('input', updateAllCanvases);
  dateCheck.addEventListener('change', updateAllCanvases);
  timeCheck.addEventListener('change', updateAllCanvases);
  textRotationInput.addEventListener('input', updateAllCanvases);

  function createImagePreview(img, index) {
    const photoItem = document.createElement('div');
    photoItem.className = 'photo-item';

    const canvas = document.createElement('canvas');
    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'btn-success';
    downloadBtn.innerHTML = `💾 儲存照片 ${index + 1}`;
    
    const data = {
      img: img,
      canvas: canvas,
      stampX: null, 
      stampY: null,
      boxW: 0,
      boxH: 0
    };

    imagesData.push(data);

    photoItem.appendChild(canvas);
    photoItem.appendChild(downloadBtn);
    previewContainer.appendChild(photoItem);

    setupCanvasDrag(data); 
    drawStampedImage(data);

    downloadBtn.addEventListener('click', () => triggerDownload(canvas, index + 1));
  }

  // --- PRO DRAG AND DROP (WITH ROTATION MATH) ---
  function setupCanvasDrag(data) {
    const canvas = data.canvas;
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    const getMousePos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      let clientX = e.clientX;
      let clientY = e.clientY;
      
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      }
      
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    };

    const startDrag = (e) => {
      const pos = getMousePos(e);
      const angle = parseInt(textRotationInput.value) * Math.PI / 180;
      
      // Calculate distance from center
      const dx = pos.x - data.stampX;
      const dy = pos.y - data.stampY;
      
      // Un-rotate the point to check against standard bounding box
      const unrotatedX = dx * Math.cos(-angle) - dy * Math.sin(-angle);
      const unrotatedY = dx * Math.sin(-angle) + dy * Math.cos(-angle);

      // Check if tap is inside the box bounds (relative to center)
      if (unrotatedX >= -data.boxW / 2 && unrotatedX <= data.boxW / 2 &&
          unrotatedY >= -data.boxH / 2 && unrotatedY <= data.boxH / 2) {
        isDragging = true;
        dragOffsetX = pos.x - data.stampX;
        dragOffsetY = pos.y - data.stampY;
        e.preventDefault(); 
      }
    };

    const onDrag = (e) => {
      if (!isDragging) return;
      const pos = getMousePos(e);
      data.stampX = pos.x - dragOffsetX;
      data.stampY = pos.y - dragOffsetY;
      drawStampedImage(data);
      e.preventDefault();
    };

    const endDrag = () => isDragging = false;

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', endDrag);

    canvas.addEventListener('touchstart', startDrag, { passive: false });
    canvas.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('touchend', endDrag);
  }

  // --- DRAWING LOGIC ---
  function drawStampedImage(data) {
    const canvas = data.canvas;
    const img = data.img;
    const ctx = canvas.getContext('2d');
    
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    // --- NEW HIGH-RES FONT SCALING ---
    const sizeMultiplier = parseInt(textSizeInput.value) / 30;
    const baseSize = Math.max(canvas.width, canvas.height) * 0.02;
    const fontSize = Math.max(12, Math.floor(baseSize * sizeMultiplier)); 
    ctx.font = `bold ${fontSize}px sans-serif`;
    
    const customText = overlayTextInput.value.trim();
    const showDate = dateCheck.checked;
    const showTime = timeCheck.checked;
    
    const now = new Date();
    let dateStr = "";
    let timeStr = "";
    
    if (showDate) dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
    if (showTime) timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

    let dateTimeLine = "";
    if (showDate && showTime) dateTimeLine = `Date: ${dateStr}      Time: ${timeStr}`;
    else if (showDate) dateTimeLine = `Date: ${dateStr}`;
    else if (showTime) dateTimeLine = `Time: ${timeStr}`;

    if (!customText && !dateTimeLine) return;

    // Dimensions
    const padding = fontSize * 0.8;
    const textWidth = customText ? ctx.measureText(customText).width : 0;
    const dateWidth = dateTimeLine ? ctx.measureText(dateTimeLine).width : 0;
    const boxWidth = Math.max(textWidth, dateWidth) + (padding * 2);
    
    let boxHeight = padding * 2;
    if (customText) boxHeight += fontSize;
    if (customText && dateTimeLine) boxHeight += (fontSize * 0.4); 
    if (dateTimeLine) boxHeight += fontSize;

    data.boxW = boxWidth;
    data.boxH = boxHeight;

    // Default spawn point (Bottom-Left center)
    const margin = fontSize;
    if (data.stampX === null) {
        data.stampX = margin + boxWidth / 2;
        data.stampY = canvas.height - margin - boxHeight / 2;
    }

    const angle = parseInt(textRotationInput.value) * Math.PI / 180;

    // Apply rotation and draw from the center out
    ctx.save();
    ctx.translate(data.stampX, data.stampY);
    ctx.rotate(angle);

    ctx.fillStyle = hexToRgba(bgColorInput.value, parseInt(bgOpacityInput.value) / 100);
    ctx.beginPath();
    ctx.roundRect(-boxWidth / 2, -boxHeight / 2, boxWidth, boxHeight, fontSize * 0.3);
    ctx.fill();

    ctx.fillStyle = textColorInput.value;
    ctx.textBaseline = 'top';
    
    let currentY = (-boxHeight / 2) + padding;
    if (customText) {
      ctx.fillText(customText, (-boxWidth / 2) + padding, currentY);
      currentY += fontSize + (fontSize * 0.4);
    }
    if (dateTimeLine) {
      ctx.fillText(dateTimeLine, (-boxWidth / 2) + padding, currentY);
    }

    ctx.restore();
  }

  function applyDynamicCompression(canvas) {
    const qualityPercentage = parseInt(qualityInput.value);
    let finalCanvas = canvas;
    if (qualityPercentage < 100) {
        const maxDim = 600 + (qualityPercentage * 18); 
        let w = canvas.width;
        let h = canvas.height;
        if (w > maxDim || h > maxDim) {
            const ratio = Math.min(maxDim / w, maxDim / h);
            w *= ratio; h *= ratio;
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(canvas, 0, 0, w, h);
            finalCanvas = c;
        }
    }
    return finalCanvas;
  }

  function triggerDownload(canvas, fileIndex) {
    const now = new Date();
    const yy = String(now.getFullYear()).slice(-2);
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const sec = String(now.getSeconds()).padStart(2, '0');
    
    let safeCustomText = overlayTextInput.value.trim() || '現場照片';
    safeCustomText = safeCustomText.replace(/[\/\\?%*:|"<>]/g, '-'); 
    
    const finalCanvas = applyDynamicCompression(canvas);
    const qualityPercentage = parseInt(qualityInput.value);

    const dataURL = finalCanvas.toDataURL('image/jpeg', qualityPercentage / 100);
    const link = document.createElement('a');
    link.download = `${safeCustomText}_${yy}${mm}${dd}-${hh}${min}${sec}-${fileIndex}.jpg`;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  downloadAllBtn.addEventListener('click', async () => {
    const originalText = downloadAllBtn.innerHTML;
    downloadAllBtn.disabled = true;
    downloadAllBtn.innerHTML = '⏳ 正在打包成 ZIP...請稍候';

    try {
      const zip = new JSZip();
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      
      let safeCustomText = overlayTextInput.value.trim() || '現場照片';
      safeCustomText = safeCustomText.replace(/[\/\\?%*:|"<>]/g, '-'); 
      const qualityPercentage = parseInt(qualityInput.value);

      imagesData.forEach((data, index) => {
        const finalCanvas = applyDynamicCompression(data.canvas);
        const dataURL = finalCanvas.toDataURL('image/jpeg', qualityPercentage / 100);
        const base64Data = dataURL.split(',')[1];
        const fileName = `${safeCustomText}_${yy}${mm}${dd}-${hh}${min}-${index + 1}.jpg`;
        zip.file(fileName, base64Data, {base64: true});
      });

      const content = await zip.generateAsync({ type: "blob" });
      const link = document.createElement('a');
      link.download = `Batch_Photos_${yy}${mm}${dd}-${hh}${min}.zip`;
      link.href = URL.createObjectURL(content);
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);

    } catch (error) {
      console.error("ZIP creation failed:", error);
      alert("打包失敗，請重試。 (Zip creation failed)");
    } finally {
      downloadAllBtn.disabled = false;
      downloadAllBtn.innerHTML = originalText;
    }
  });
</script>
</body>
</html>
