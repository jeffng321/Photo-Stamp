<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OGS Photo Stamper Tool v1.0</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0; background: #f1f5f9; color: #1e293b;
  }
  header {
    background: #0f172a; color: #fff; padding: 16px; text-align: center;
  }
  header h1 { margin: 0; font-size: 1.25rem; }
  .container { max-width: 600px; margin: 0 auto; padding: 12px; }
  
  .card {
    background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  .card h2 { font-size: 1rem; margin: 0 0 12px; color: #0f172a; }
  
  .settings-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
  .settings-row label { font-size: 0.85rem; font-weight: 600; color: #334155; }
  .settings-row input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; padding: 0; border-radius: 4px; }
  .settings-row input[type="range"] { flex-grow: 1; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }

  label.field { display:block; font-size:.85rem; font-weight:600; margin-bottom:6px; color:#334155; }
  input[type=file], input[type=text] {
    width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.95rem; font-family:inherit; margin-bottom: 15px;
  }
  
  /* Canvas Preview Area */
  .preview-wrap {
    width: 100%; border: 2px dashed #cbd5e1; border-radius: 8px;
    background: #f8fafc; min-height: 200px; display:flex; 
    align-items:center; justify-content:center; overflow: hidden;
    margin-bottom: 15px;
  }
  canvas {
    max-width: 100%;
    height: auto;
    display: none; /* Hidden until image is loaded */
  }
  .placeholder { color:#94a3b8; padding:40px 10px; text-align:center; }

  button {
    cursor:pointer; border:none; border-radius:8px; padding:12px 16px;
    font-size:1rem; font-weight:600; width: 100%;
  }
  .btn-success { background:#16a34a; color:#fff; }
</style>
</head>
<body>

<header>
  <h1>📸 OGS Photo Stamper Tool v1.0</h1>
</header>

<div class="container">
  
  <div class="card">
    <h2>1. 設定文字與照片</h2>
    
    <label class="field">自訂文字</label>
    <input type="text" id="overlayText" placeholder="在此輸入文字...">

    <div class="settings-row">
      <label>字體顏色:</label>
      <input type="color" id="textColorInput" value="#ffffff">
      <label style="margin-left: 10px;">大小:</label>
      <input type="range" id="textSizeInput" min="10" max="80" value="30">
    </div>

    <div class="settings-row">
      <label>背景顏色:</label>
      <input type="color" id="bgColorInput" value="#000000">
      <label style="margin-left: 10px;">透明度:</label>
      <input type="range" id="bgOpacityInput" min="0" max="100" value="60">
    </div>
    
    <label class="checkbox-row">
      <input type="checkbox" id="compressCheck"> 壓縮圖片輸出 (適合傳送)
    </label>

    <label class="field">選擇照片 (相機或相簿)</label>
    <input type="file" id="photoInput" accept="image/*">
  </div>

  <div class="card">
    <h2>2. 預覽</h2>
    <div class="preview-wrap">
      <div class="placeholder" id="placeholderMsg">上傳照片以查看預覽</div>
      <canvas id="photoCanvas"></canvas>
    </div>
    
    <button class="btn-success" id="downloadBtn" disabled>💾 儲存標記照片</button>
  </div>

</div>

<script>
  const photoInput = document.getElementById('photoInput');
  const overlayTextInput = document.getElementById('overlayText');
  const canvas = document.getElementById('photoCanvas');
  const ctx = canvas.getContext('2d');
  const placeholderMsg = document.getElementById('placeholderMsg');
  const downloadBtn = document.getElementById('downloadBtn');
  const textColorInput = document.getElementById('textColorInput');
  const textSizeInput = document.getElementById('textSizeInput');
  const bgColorInput = document.getElementById('bgColorInput');
  const bgOpacityInput = document.getElementById('bgOpacityInput');
  const compressCheck = document.getElementById('compressCheck');

  let currentImage = null;

  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }

  photoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => { currentImage = img; drawStampedImage(); };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  overlayTextInput.addEventListener('input', () => { if (currentImage) drawStampedImage(); });
  textColorInput.addEventListener('input', drawStampedImage);
  textSizeInput.addEventListener('input', drawStampedImage);
  bgColorInput.addEventListener('input', drawStampedImage);
  bgOpacityInput.addEventListener('input', drawStampedImage);

  function drawStampedImage() {
    if (!currentImage) return;
    placeholderMsg.style.display = 'none';
    canvas.style.display = 'block';
    downloadBtn.disabled = false;
    canvas.width = currentImage.width;
    canvas.height = currentImage.height;
    ctx.drawImage(currentImage, 0, 0);

    const sizeMultiplier = parseInt(textSizeInput.value) / 30;
    const fontSize = Math.max(12, Math.floor(canvas.height * 0.03 * sizeMultiplier)); 
    ctx.font = `bold ${fontSize}px sans-serif`;
    
    const customText = overlayTextInput.value.trim();
    const now = new Date();
    const dateStr = now.getFullYear() + '/' + String(now.getMonth() + 1).padStart(2, '0') + '/' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

    const padding = fontSize * 0.8;
    const boxWidth = Math.max(ctx.measureText(customText).width, ctx.measureText(dateStr).width) + (padding * 2);
    const boxHeight = (fontSize * 2) + (fontSize * 0.4) + (padding * 2);
    const margin = fontSize;
    const boxX = margin;
    const boxY = canvas.height - boxHeight - margin;

    ctx.fillStyle = hexToRgba(bgColorInput.value, parseInt(bgOpacityInput.value) / 100);
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxWidth, boxHeight, fontSize * 0.3);
    ctx.fill();

    ctx.fillStyle = textColorInput.value;
    ctx.textBaseline = 'top';
    ctx.fillText(customText, boxX + padding, boxY + padding);
    ctx.fillText(dateStr, boxX + padding, boxY + padding + fontSize + (fontSize * 0.4));
  }

  downloadBtn.addEventListener('click', () => {
    if (!currentImage) return;
    
    const now = new Date();
    const yy = String(now.getFullYear()).slice(-2);
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    
    let safeCustomText = overlayTextInput.value.trim() || '現場照片';
    safeCustomText = safeCustomText.replace(/[\/\\?%*:|"<>]/g, '-'); 
    
    // Compression Logic
    let finalCanvas = canvas;
    if (compressCheck.checked) {
        const maxDim = 1200;
        let w = canvas.width;
        let h = canvas.height;
        if (w > maxDim || h > maxDim) {
            const ratio = Math.min(maxDim / w, maxDim / h);
            w *= ratio; h *= ratio;
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(canvas, 0, 0, w, h);
            finalCanvas = c;
        }
    }

    const dataURL = finalCanvas.toDataURL('image/jpeg', compressCheck.checked ? 0.6 : 0.9);
    const link = document.createElement('a');
    link.download = `${safeCustomText}_${yy}${mm}${dd}-${hh}${min}.jpg`;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
</script>
</body>
</html>
