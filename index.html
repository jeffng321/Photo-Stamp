<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OGS Photo Stamper Tool v1.0</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0; background: #f1f5f9; color: #1e293b;
  }
  header {
    background: #0f172a; color: #fff; padding: 16px; text-align: center;
  }
  header h1 { margin: 0; font-size: 1.25rem; }
  .container { max-width: 600px; margin: 0 auto; padding: 12px; }
  
  .card {
    background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  .card h2 { font-size: 1rem; margin: 0 0 12px; color: #0f172a; }
  
  .settings-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
  .settings-row label { font-size: 0.85rem; font-weight: 600; color: #334155; }
  .settings-row input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; padding: 0; border-radius: 4px; }
  .settings-row input[type="range"] { flex-grow: 1; }

  label.field { display:block; font-size:.85rem; font-weight:600; margin-bottom:6px; color:#334155; }
  input[type=file], input[type=text] {
    width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;
    font-size:.95rem; font-family:inherit; margin-bottom: 15px;
  }
  
  /* Canvas Preview Area */
  .preview-wrap {
    width: 100%; border: 2px dashed #cbd5e1; border-radius: 8px;
    background: #f8fafc; min-height: 200px; display:flex; 
    align-items:center; justify-content:center; overflow: hidden;
    margin-bottom: 15px;
  }
  canvas {
    max-width: 100%;
    height: auto;
    display: none; /* Hidden until image is loaded */
  }
  .placeholder { color:#94a3b8; padding:40px 10px; text-align:center; }

  button {
    cursor:pointer; border:none; border-radius:8px; padding:12px 16px;
    font-size:1rem; font-weight:600; width: 100%;
  }
  .btn-primary { background:#2563eb; color:#fff; }
  .btn-primary:disabled { background:#94a3b8; cursor:not-allowed; }
  .btn-success { background:#16a34a; color:#fff; }
</style>
</head>
<body>

<header>
  <h1>📸 OGS Photo Stamper Tool v1.0</h1>
</header>

<div class="container">
  
  <div class="card">
    <h2>1. 設定文字與照片</h2>
    
    <label class="field">自訂文字 (例如: 地點 / 備註)</label>
    <input type="text" id="overlayText" placeholder="在此輸入文字...">

    <div class="settings-row">
      <label>字體顏色:</label>
      <input type="color" id="textColorInput" value="#ffffff">
      <label style="margin-left: 10px;">大小:</label>
      <input type="range" id="textSizeInput" min="10" max="80" value="30">
    </div>

    <div class="settings-row">
      <label>背景顏色:</label>
      <input type="color" id="bgColorInput" value="#000000">
      <label style="margin-left: 10px;">透明度:</label>
      <input type="range" id="bgOpacityInput" min="0" max="100" value="60">
    </div>

    <label class="field">選擇照片 (相機或相簿)</label>
    <input type="file" id="photoInput" accept="image/*">
  </div>

  <div class="card">
    <h2>2. 預覽</h2>
    <div class="preview-wrap">
      <div class="placeholder" id="placeholderMsg">上傳照片以查看預覽</div>
      <canvas id="photoCanvas"></canvas>
    </div>
    
    <button class="btn-success" id="downloadBtn" disabled>💾 儲存標記照片</button>
  </div>

</div>

<script>
  const photoInput = document.getElementById('photoInput');
  const overlayTextInput = document.getElementById('overlayText');
  const canvas = document.getElementById('photoCanvas');
  const ctx = canvas.getContext('2d');
  const placeholderMsg = document.getElementById('placeholderMsg');
  const downloadBtn = document.getElementById('downloadBtn');
  const textColorInput = document.getElementById('textColorInput');
  const textSizeInput = document.getElementById('textSizeInput');
  const bgColorInput = document.getElementById('bgColorInput');
  const bgOpacityInput = document.getElementById('bgOpacityInput');

  let currentImage = null;

  // Helper function to convert Hex to RGBA for the background opacity
  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }

  // Listen for file upload
  photoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        currentImage = img;
        drawStampedImage();
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  // Listen for text and customization changes to update stamp in real-time
  overlayTextInput.addEventListener('input', () => {
    if (currentImage) drawStampedImage();
  });
  textColorInput.addEventListener('input', drawStampedImage);
  textSizeInput.addEventListener('input', drawStampedImage);
  bgColorInput.addEventListener('input', drawStampedImage);
  bgOpacityInput.addEventListener('input', drawStampedImage);

  function drawStampedImage() {
    if (!currentImage) return;

    // Hide placeholder, show canvas
    placeholderMsg.style.display = 'none';
    canvas.style.display = 'block';
    downloadBtn.disabled = false;

    // Set canvas size to match the original image resolution exactly
    canvas.width = currentImage.width;
    canvas.height = currentImage.height;

    // 1. Draw original photo
    ctx.drawImage(currentImage, 0, 0);

    // 2. Prepare text and font sizes proportionally based on user input and image size
    const sizeMultiplier = parseInt(textSizeInput.value) / 30; // 30 is default
    const fontSize = Math.max(12, Math.floor(canvas.height * 0.03 * sizeMultiplier)); 
    ctx.font = `bold ${fontSize}px sans-serif`;
    
    const customText = overlayTextInput.value.trim();
    
    // Format the date/time: YYYY/MM/DD HH:MM
    const now = new Date();
    const dateStr = now.getFullYear() + '/' + 
                   String(now.getMonth() + 1).padStart(2, '0') + '/' + 
                   String(now.getDate()).padStart(2, '0') + ' ' + 
                   String(now.getHours()).padStart(2, '0') + ':' + 
                   String(now.getMinutes()).padStart(2, '0');

    // 3. Calculate Stamp Box Dimensions
    const padding = fontSize * 0.8;
    const textWidth1 = ctx.measureText(customText).width;
    const textWidth2 = ctx.measureText(dateStr).width;
    const boxWidth = Math.max(textWidth1, textWidth2) + (padding * 2);
    
    // Two lines of text: height includes font height + line spacing + padding
    const lineSpacing = fontSize * 0.4;
    const boxHeight = (fontSize * 2) + lineSpacing + (padding * 2);

    // Position: Bottom Left Corner (with a small margin from the very edge)
    const margin = fontSize;
    const boxX = margin;
    const boxY = canvas.height - boxHeight - margin;

    // 4. Draw Custom Background Box with Opacity
    const opacityVal = parseInt(bgOpacityInput.value) / 100;
    ctx.fillStyle = hexToRgba(bgColorInput.value, opacityVal);
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxWidth, boxHeight, fontSize * 0.3); // rounded corners
    ctx.fill();

    // 5. Draw Custom Colored Text
    ctx.fillStyle = textColorInput.value;
    ctx.textBaseline = 'top';
    
    // Draw Custom Text (Line 1)
    ctx.fillText(customText, boxX + padding, boxY + padding);
    
    // Draw Date/Time (Line 2)
    ctx.fillText(dateStr, boxX + padding, boxY + padding + fontSize + lineSpacing);
  }

  // Handle Download
  downloadBtn.addEventListener('click', () => {
    if (!currentImage) return;
    
    // Generate file name with current time
    const now = new Date();
    const yy = String(now.getFullYear()).slice(-2);
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    
    // Sanitize custom text to make sure it's a valid file name
    let safeCustomText = overlayTextInput.value.trim() || '現場照片';
    safeCustomText = safeCustomText.replace(/[\/\\?%*:|"<>]/g, '-'); 
    
    const fileName = `${safeCustomText}_${yy}${mm}${dd}-${hh}${min}.jpg`;

    // Convert Canvas to JPEG Data URL
    const dataURL = canvas.toDataURL('image/jpeg', 0.9);

    // Create an invisible link to trigger the download
    const link = document.createElement('a');
    link.download = fileName;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });

</script>
</body>
</html>
